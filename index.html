<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Suchmaschinen Basis -->
    <title>SimpleShare - Der Marktplatz für Videolizenzen</title>
    <meta
      name="description"
      content="SimpleShare - Damit du endlich den fairen Anteil an deinen Videos bekommst. Sicherer Marktplatz für Lizenzen und Content-Creator."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://simpleshare.eu/" />

    <!-- Open Graph / Social Media (Facebook, WhatsApp, Discord etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://simpleshare.eu/" />
    <meta
      property="og:title"
      content="SimpleShare - Der Marktplatz für Videolizenzen"
    />
    <meta
      property="og:description"
      content="Damit du endlich den fairen Anteil an deinen Videos bekommst. Sicherer Marktplatz für Lizenzen."
    />
    <meta property="og:image" content="https://simpleshare.eu/og-image.jpg" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="SimpleShare - Der Marktplatz für Videolizenzen"
    />
    <meta
      name="twitter:description"
      content="Damit du endlich den fairen Anteil an deinen Videos bekommst. Sicherer Marktplatz."
    />
    <meta name="twitter:image" content="https://simpleshare.eu/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
